version: "3.9"

services:
  rgstr:
    build: .
    image: rgstr:latest
    container_name: rgstr
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - rgstr-data:/data
    env_file:
      - .env
    environment:
      # Override storage path to the Docker volume mount point.
      # All other settings come from .env
      RGSTR_STORAGE: "/data"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Optional: nginx TLS termination proxy
  # Uncomment if you want HTTPS without touching the registry binary.
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/rgstr.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - rgstr

volumes:
  rgstr-data:
