# rgstr — nginx TLS termination
# Replace registry.example.com with your actual domain.

server {
    listen 80;
    server_name registry.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name registry.example.com;

    ssl_certificate     /etc/letsencrypt/live/registry.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Required for large image layers — disable size limit and buffering.
    client_max_body_size    0;
    proxy_request_buffering off;

    location / {
        # Use Docker's internal DNS resolver so upstream is resolved per-request,
        # not at nginx startup (avoids "host not found" if rgstr isn't up yet).
        resolver           127.0.0.11 valid=10s;
        set $upstream      http://rgstr:5000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep connections alive for chunked uploads.
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        proxy_read_timeout  900s;
        proxy_send_timeout  900s;
    }
}
